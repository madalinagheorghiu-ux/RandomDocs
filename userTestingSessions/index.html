<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>User-testing sessions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF8F1; --paper-2:#F3EEE2; --ink:#211F1B; --ink-soft:#5A554C;
    --rule:#D8D1C0; --mark:#B23A2E; --amber:#9C7A1E; --green:#2E6F5E;
    --blue:#3A5A78; --plum:#6E4A6B; --hl:#FBF1D9; --shadow:rgba(33,31,27,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Open Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  .mono{font-family:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  .wrap{max-width:960px;margin:0 auto;padding:0 22px 80px}
  header.mast{border-bottom:1px solid var(--rule);margin-top:40px;margin-bottom:20px;padding-bottom:16px}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  h1{font-size:30px;line-height:1.15;margin:6px 0 6px;font-weight:700;letter-spacing:-.01em}
  .sub{color:var(--ink-soft);font-size:14px}

  .controls{display:flex;flex-direction:column;gap:14px;margin-bottom:26px}
  .ctl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ctl-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;margin-right:2px}
  select.filter{font:inherit;font-size:13px;color:var(--ink);background:#fff;border:1px solid var(--rule);border-radius:8px;padding:6px 10px;cursor:pointer}
  .count{font-size:12px;color:var(--ink-soft)}

  .grid{display:grid;gap:14px}
  .card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--rule);border-radius:14px;
    padding:18px 20px;box-shadow:0 1px 2px rgba(31,27,22,.05),0 10px 22px -16px rgba(31,27,22,.25);transition:transform .12s,box-shadow .12s,border-color .12s}
  .card:hover{transform:translateY(-2px);border-color:var(--ink-soft);box-shadow:0 2px 4px rgba(31,27,22,.07),0 16px 30px -18px rgba(31,27,22,.34)}
  .card-top{display:flex;justify-content:space-between;align-items:baseline;gap:16px}
  .card h2{font-size:18px;font-weight:600;margin:0;line-height:1.25}
  .card .date{font-size:12px;color:var(--ink-soft);white-space:nowrap}
  .meta-line{font-size:12.5px;color:var(--ink-soft);margin:6px 0 0;display:flex;gap:14px;flex-wrap:wrap}
  .meta-line b{color:var(--ink);font-weight:600}
  .empty{text-align:center;color:var(--ink-soft);padding:50px 0;font-size:14px}
  footer{margin-top:40px;border-top:1px solid var(--rule);padding-top:14px;font-size:11.5px;color:var(--ink-soft)}
  @media(max-width:560px){.card-top{flex-direction:column;gap:4px}.count{margin-left:0}}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="eyebrow">Meeting Insights · review tools</div>
    <h1>User-testing sessions</h1>
    <div class="sub" id="sub">Repaired transcripts &amp; triaged insight cards, one page per session.</div>
  </header>

  <div class="controls">
    <div class="ctl-row">
      <span class="count" id="count"></span>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>No sessions yet.</div>

  <footer>Generated by the <span class="mono">meetinginsights</span> skill · <span id="gen"></span></footer>
</div>

<script>
const SESSIONS = [{"id": "migration-goj-2026-07-06", "title": "Bulk migration — usability test (Goj)", "date": "2026-07-06", "participant": "Goj", "feature": "Bulk migration (usability test)", "insights": 18, "file": "migration-goj-2026-07-06.html"}, {"id": "config-chat-workflows-delia-2026-07-14", "title": "Config chat & workflows — Delia (Dr Max legal)", "date": "2026-07-14", "participant": "Delia Glodeanu (Configurator)", "feature": "Config way of working — multi-tab & navigation", "insights": 16, "file": "config-chat-workflows-delia-2026-07-14.html"}, {"id": "merge-experience-cristi-d-2026-07-21", "title": "Merge experience — Cristi D", "date": "2026-07-21", "participant": "Cristi D", "feature": "Merge experience (project versioning & branching console)", "insights": 13, "file": "merge-experience-cristi-d-2026-07-21.html"}, {"id": "bulk-migration-adelina-2026-07-09", "title": "Bulk migration — follow-up test", "date": "2026-07-09", "participant": "Adelina Bucătariu (FDE)", "feature": "Bulk migration (process-instance migration)", "insights": 17, "file": "bulk-migration-adelina-2026-07-09.html"}];
const GENERATED = "2026-07-23";

const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function buildControls(){
  document.getElementById('gen').textContent = GENERATED;
}

function render(){
  let rows = SESSIONS.slice();
  // newest date first
  rows.sort((a,b) => (a.date<b.date?1:a.date>b.date?-1:0));

  const grid = document.getElementById('grid');
  grid.innerHTML = rows.map(x => `
    <a class="card" href="${esc(x.file)}">
      <div class="card-top">
        <h2>${esc(x.title || x.feature || x.id)}</h2>
        <span class="date mono">${esc(x.date||'')}</span>
      </div>
      <div class="meta-line">
        ${x.participant ? `<span>Participant <b>${esc(x.participant)}</b></span>` : ''}
        ${x.feature ? `<span>Feature <b>${esc(x.feature)}</b></span>` : ''}
        ${x.insights != null ? `<span><b>${x.insights}</b> insights</span>` : ''}
      </div>
    </a>`).join('');

  document.getElementById('empty').hidden = rows.length > 0;
  const n = rows.length, tot = SESSIONS.length;
  document.getElementById('count').textContent =
    (n === tot) ? `${tot} session${tot!==1?'s':''}` : `${n} of ${tot} sessions`;
}

buildControls();
render();
</script>
</body>
</html>
